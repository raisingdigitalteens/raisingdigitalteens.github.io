<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raising Digital Teens — First Phone Setup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #FAF8F5; color: #2C2C2C; }
  input[type=range] { width: 100%; max-width: 360px; accent-color: #4A7C6F; display: block; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const C = {
  bg: "#FAF8F5",
  bgCard: "#FFFFFF",
  bgMuted: "#F2EFE9",
  bgAccent: "#EEF4F2",
  sage: "#4A7C6F",
  sageDim: "#3D6860",
  sageFaint: "rgba(74,124,111,0.10)",
  terra: "#C4714A",
  terraFaint: "rgba(196,113,74,0.10)",
  charcoal: "#2C2C2C",
  mid: "#6B6B6B",
  muted: "#9A9A9A",
  border: "rgba(0,0,0,0.07)",
  borderMed: "rgba(0,0,0,0.12)",
  shadow: "0 2px 12px rgba(0,0,0,0.07)",
  shadowMd: "0 4px 20px rgba(0,0,0,0.10)",
  green: "#4A7C6F",
  greenFaint: "rgba(74,124,111,0.10)",
  yellow: "#D4952A",
  yellowFaint: "rgba(212,149,42,0.10)",
  red: "#B85450",
  redFaint: "rgba(184,84,80,0.10)",
  purple: "#6B5EA8",
  purpleFaint: "rgba(107,94,168,0.10)",
};

const CATEGORIES = [
  { id: "downloads", icon: "📲", label: "App Downloads", question: "How should app downloads work?", sub: "Controls whether they can install new apps without your permission.",
    levels: { "age-appropriate": { label: "Approval required", desc: "Every download request comes to you first before anything installs." }, "restricted": { label: "Fully restricted", desc: "Nothing installs without you doing it manually yourself." }, "off": { label: "Completely blocked", desc: "App Store or Play Store access removed entirely." } },
    detail: { "age-appropriate": "iOS: Family Sharing → Ask to Buy on. Android: Family Link → Approved apps only.", "restricted": "iOS: Screen Time → Installing Apps: Don't Allow. Android: Family Link, manually install everything.", "off": "iOS: Content & Privacy → block App Store. Android: Play Store removed via Family Link." } },
  { id: "web", icon: "🌐", label: "Web Browsing", question: "What should they be able to access online?", sub: "Controls what websites and content they can reach through the browser.",
    levels: { "age-appropriate": { label: "Filtered browsing", desc: "Adult content blocked, SafeSearch on. General browsing allowed." }, "restricted": { label: "Approved sites only", desc: "Only a list of sites you approve. Everything else blocked." }, "off": { label: "Browser removed", desc: "Web browser blocked or removed entirely." } },
    detail: { "age-appropriate": "iOS: Screen Time → Content & Privacy → Web Content → Limit Adult Websites + SafeSearch. Android: Family Link content filters on.", "restricted": "iOS: Web Content → Allowed Websites Only. Android: Chrome restricted to approved sites.", "off": "iOS: Safari blocked via Screen Time. Android: Chrome blocked via Family Link." } },
  { id: "social", icon: "💬", label: "Social Media", question: "Should they have access to social media?", sub: "Most platforms require users to be 13+. This controls what social apps they can use.",
    levels: { "age-appropriate": { label: "Age-appropriate access", desc: "Platforms matching their age with daily time limits and your visibility." }, "restricted": { label: "One approved platform", desc: "One app you've reviewed and approved, with all others blocked." }, "off": { label: "Not yet", desc: "No social media of any kind. Block by age rating or category." } },
    detail: { "age-appropriate": "iOS: App Limits → Social Networking category with daily cap. Android: Family Link app limits on social.", "restricted": "One app installed manually, all others blocked via App Limits or Family Link.", "off": "iOS: Content & Privacy → block 12+ apps. Android: Play Store → approved apps only, no social approved." } },
  { id: "screentime", icon: "⏱️", label: "Daily Screen Time", question: "Should daily screen time be capped?", sub: "Sets how long they can spend on entertainment, games, and social apps each day.",
    levels: { "age-appropriate": { label: "Recommended limits", desc: "1–2 hrs entertainment, 1 hr social, 1 hr gaming on school days." }, "restricted": { label: "Tighter limits", desc: "45 min entertainment, 30 min social, 45 min gaming on school days." }, "off": { label: "No caps", desc: "No automatic limits. You manage usage through household rules." } },
    detail: { "age-appropriate": "iOS: Screen Time → App Limits by category. Android: Family Link → daily screen time.", "restricted": "Same tools, tighter numbers. Revisit in 30 days based on how it goes.", "off": "No limits configured. Consider revisiting after the first month with usage data." } },
  { id: "bedtime", icon: "🌙", label: "Bedtime Lock", question: "Should the phone lock automatically at night?", sub: "Sets a schedule so the device becomes inaccessible at a set hour — no willpower required.",
    levels: { "age-appropriate": { label: "Age-appropriate bedtime", desc: "Device locks at the right time for their age. Only calls allowed after." }, "restricted": { label: "Earlier + stricter", desc: "Locks one hour earlier with no exceptions, including calls." }, "off": { label: "No schedule", desc: "No automatic lock. You manage bedtime through household rules." } },
    detail: { "age-appropriate": "iOS: Screen Time → Downtime. Ages 8–10: 7:30pm. Ages 11–13: 9pm. Ages 14+: 10pm. Android: Family Link bedtime.", "restricted": "One hour earlier than default. All apps including calls blocked during Downtime.", "off": "No Downtime configured. Strongly recommend a physical charging station outside the bedroom instead." } },
  { id: "communication", icon: "📞", label: "Communication", question: "Who should they be able to contact?", sub: "Controls who can reach them and who they can reach — especially overnight.",
    levels: { "age-appropriate": { label: "Contacts only", desc: "Contacts during the day. Family contacts only overnight." }, "restricted": { label: "Family only", desc: "Family contacts only at all hours. No outside messaging apps." }, "off": { label: "No limits", desc: "Open contact with anyone. No restrictions set." } },
    detail: { "age-appropriate": "iOS: Screen Time → Communication Limits → Contacts Only / Specific Contacts during Downtime. Android: Family Link contact controls.", "restricted": "iOS: Communication Limits → Specific Contacts (family) at all times. Block messaging apps except SMS.", "off": "No communication limits configured." } },
  { id: "location", icon: "📍", label: "Location Sharing", question: "Should you be able to see where they are?", sub: "Shows device location from your phone. A safety layer, not a replacement for communication.",
    levels: { "age-appropriate": { label: "On and shared openly", desc: "Location visible to you, framed as a mutual safety feature." }, "restricted": { label: "On, private", desc: "Location visible to you only. Your child isn't notified when you check." }, "off": { label: "Off", desc: "No location sharing enabled." } },
    detail: { "age-appropriate": "iOS: Find My → Share My Location. Consider sharing yours too. Android: Family Link shows device location automatically.", "restricted": "Same setup — not recommended for teens as transparency tends to build more trust.", "off": "No location sharing configured." } },
  { id: "spending", icon: "💳", label: "In-App Purchases", question: "Should they be able to make purchases?", sub: "Controls in-app purchases, subscriptions, and paid downloads.",
    levels: { "age-appropriate": { label: "Your approval required", desc: "Every purchase needs your sign-off. You get notified before anything charges." }, "restricted": { label: "Purchases blocked", desc: "In-app purchases disabled. No payment method on the account." }, "off": { label: "No limits", desc: "Purchases allowed without approval. Not recommended under 18." } },
    detail: { "age-appropriate": "iOS: Family Sharing → Ask to Buy. Screen Time → In-app Purchases → Require Password. Android: Family Link purchase approval.", "restricted": "iOS: Screen Time → In-app Purchases: Don't Allow. Remove saved payment methods. Android: same via Family Link.", "off": "No purchase restrictions. Strongly recommended to reconsider." } },
];

const LEVEL_META = {
  "age-appropriate": { color: C.green,  faint: C.greenFaint,  icon: "✓", tag: "Recommended" },
  "restricted":      { color: C.yellow, faint: C.yellowFaint, icon: "↓", tag: "More restrictive" },
  "off":             { color: C.red,    faint: C.redFaint,    icon: "✕", tag: "Blocked" },
};

// ── helpers ────────────────────────────────────────────────────
function Label({ children, color = C.sage }) {
  return <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color, marginBottom: 8 }}>{children}</div>;
}
function RichText({ text, done }) {
  const parts = text.split(/(<strong>.*?<\/strong>)/g);
  return (
    <span style={{ textDecoration: done ? "line-through" : "none", opacity: done ? 0.4 : 1, transition: "all 0.2s" }}>
      {parts.map((p, i) => p.startsWith("<strong>")
        ? <strong key={i} style={{ color: C.charcoal, fontWeight: 600 }}>{p.replace(/<\/?strong>/g, "")}</strong>
        : <span key={i}>{p}</span>)}
    </span>
  );
}

function Card({ children, style = {}, accent }) {
  return (
    <div style={{
      background: C.bgCard, borderRadius: 20,
      boxShadow: C.shadow,
      border: accent ? `1.5px solid ${accent}` : `1px solid ${C.border}`,
      marginBottom: 12, overflow: "hidden", ...style,
    }}>{children}</div>
  );
}

function PickCard({ icon, label, sub, selected, onClick }) {
  return (
    <div onClick={onClick} style={{
      flex: "1 1 140px", background: selected ? C.bgAccent : C.bgCard,
      border: `1.5px solid ${selected ? C.sage : C.border}`,
      borderRadius: 16, padding: "16px 18px", cursor: "pointer",
      position: "relative", boxShadow: C.shadow, transition: "all 0.18s",
    }}>
      {selected && <div style={{ position: "absolute", top: 12, right: 12, width: 20, height: 20, borderRadius: "50%", background: C.sage, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>✓</span></div>}
      <div style={{ fontSize: 22, marginBottom: 8 }}>{icon}</div>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.charcoal, marginBottom: sub ? 3 : 0 }}>{label}</div>
      {sub && <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>{sub}</div>}
    </div>
  );
}

function Pill({ label, selected, onClick, color }) {
  const col = color || C.sage;
  return (
    <div onClick={onClick} style={{
      fontSize: 13, fontWeight: 500, padding: "8px 16px", borderRadius: 100,
      border: `1.5px solid ${selected ? col : C.border}`,
      background: selected ? `rgba(${col === C.sage ? "74,124,111" : "107,94,168"},0.08)` : C.bgCard,
      color: selected ? col : C.muted,
      cursor: "pointer", userSelect: "none", transition: "all 0.15s",
      boxShadow: "0 1px 4px rgba(0,0,0,0.05)",
    }}>{label}</div>
  );
}

function PrimaryBtn({ label, onClick, disabled, full }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      fontFamily: "inherit", fontSize: 15, fontWeight: 700,
      background: disabled ? "#E8E4DE" : C.terra,
      color: disabled ? C.muted : "#fff",
      border: "none", borderRadius: 100, padding: "14px 32px",
      cursor: disabled ? "not-allowed" : "pointer",
      boxShadow: disabled ? "none" : "0 4px 14px rgba(196,113,74,0.30)",
      transition: "all 0.2s", width: full ? "100%" : undefined,
      letterSpacing: "0.01em",
    }}>{label}</button>
  );
}
function GhostBtn({ label, onClick }) {
  return (
    <button onClick={onClick} style={{ fontFamily: "inherit", fontSize: 14, fontWeight: 500, background: "none", color: C.muted, border: "none", cursor: "pointer", padding: "14px 12px" }}>{label}</button>
  );
}

// ── progress bar ───────────────────────────────────────────────
function PlanBar({ done, total }) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  const all = done === total && total > 0;
  return (
    <div style={{ position: "sticky", top: 0, zIndex: 20, background: "rgba(250,248,245,0.95)", backdropFilter: "blur(8px)", borderBottom: `1px solid ${C.border}`, padding: "12px 24px", display: "flex", gap: 14, alignItems: "center" }}>
      <div style={{ flex: 1, height: 5, background: C.bgMuted, borderRadius: 100, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: all ? C.terra : C.sage, borderRadius: 100, transition: "width 0.4s ease" }} />
      </div>
      <div style={{ fontSize: 12, fontWeight: 700, color: all ? C.terra : C.sage, whiteSpace: "nowrap" }}>
        {all ? "✓ Done!" : `${done} / ${total}`}
      </div>
    </div>
  );
}

function WizardBar({ current, total }) {
  return (
    <div style={{ padding: "16px 24px 0" }}>
      <div style={{ display: "flex", gap: 4 }}>
        {Array.from({ length: total }).map((_, i) => (
          <div key={i} style={{ flex: 1, height: 3, borderRadius: 100, background: i <= current ? C.sage : C.bgMuted, transition: "background 0.3s" }} />
        ))}
      </div>
      <div style={{ fontSize: 11, color: C.muted, marginTop: 8 }}>{current + 1} of {total}</div>
    </div>
  );
}

// ── level card ─────────────────────────────────────────────────
function LevelCard({ levelKey, info, detail, selected, onClick }) {
  const [expanded, setExpanded] = useState(false);
  const meta = LEVEL_META[levelKey];
  return (
    <div style={{ background: selected ? `rgba(${levelKey === "age-appropriate" ? "74,124,111" : levelKey === "restricted" ? "212,149,42" : "184,84,80"},0.06)` : C.bgCard, border: `1.5px solid ${selected ? meta.color : C.border}`, borderRadius: 16, marginBottom: 10, overflow: "hidden", boxShadow: C.shadow, transition: "border-color 0.18s" }}>
      <div onClick={onClick} style={{ padding: "14px 18px", cursor: "pointer", display: "flex", gap: 14, alignItems: "flex-start" }}>
        <div style={{ width: 28, height: 28, borderRadius: "50%", flexShrink: 0, background: selected ? meta.color : C.bgMuted, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 1, transition: "background 0.18s" }}>
          <span style={{ color: selected ? "#fff" : C.muted, fontSize: 12, fontWeight: 700 }}>{meta.icon}</span>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.charcoal }}>{info.label}</div>
            {levelKey === "age-appropriate" && <div style={{ fontSize: 10, fontWeight: 700, color: C.sage, background: C.sageFaint, padding: "2px 8px", borderRadius: 100 }}>Recommended</div>}
          </div>
          <div style={{ fontSize: 13, color: C.mid, lineHeight: 1.55 }}>{info.desc}</div>
        </div>
      </div>
      {selected && (
        <div>
          <div onClick={() => setExpanded(e => !e)} style={{ padding: "0 18px 12px", cursor: "pointer" }}>
            <span style={{ fontSize: 11, color: C.muted, fontWeight: 500 }}>{expanded ? "▲ Hide details" : "▼ What gets configured"}</span>
          </div>
          {expanded && (
            <div style={{ background: C.bgMuted, padding: "12px 18px", borderTop: `1px solid ${C.border}` }}>
              <p style={{ fontSize: 12, color: C.mid, lineHeight: 1.65, margin: 0 }}>{detail}</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── summary card ───────────────────────────────────────────────
function SummaryCard({ cat, choice, onEdit }) {
  const [expanded, setExpanded] = useState(false);
  const meta = LEVEL_META[choice];
  const info = cat.levels[choice];
  return (
    <Card>
      <div style={{ padding: "14px 18px", display: "flex", gap: 12, alignItems: "center" }}>
        <div style={{ fontSize: 20, flexShrink: 0 }}>{cat.icon}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 2 }}>{cat.label}</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: meta.color }}>{info.label}</div>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          <div onClick={() => setExpanded(e => !e)} style={{ fontSize: 11, color: C.muted, cursor: "pointer", padding: "5px 8px", background: C.bgMuted, borderRadius: 8 }}>{expanded ? "▲" : "▼"}</div>
          <div onClick={onEdit} style={{ fontSize: 11, color: C.sage, cursor: "pointer", fontWeight: 700, padding: "5px 10px", background: C.sageFaint, borderRadius: 8 }}>Edit</div>
        </div>
      </div>
      {expanded && (
        <div style={{ background: C.bgMuted, padding: "12px 18px", borderTop: `1px solid ${C.border}` }}>
          <p style={{ fontSize: 12, color: C.mid, lineHeight: 1.65, margin: 0 }}>{cat.detail[choice]}</p>
        </div>
      )}
    </Card>
  );
}

// ── section ────────────────────────────────────────────────────
function Section({ s, si, checked, onToggle, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  const checkable = s.type === "steps" || s.type === "checklist";
  const total = s.items?.length || 0;
  const done = checkable ? (checked[si] || []).filter(Boolean).length : 0;
  const allDone = checkable && done === total && total > 0;
  const isBaseline = s.isBaseline;

  return (
    <Card accent={isBaseline ? (allDone ? C.sage : C.terra) : undefined}>
      {isBaseline && <div style={{ height: 4, background: allDone ? C.sage : C.terra, transition: "background 0.4s" }} />}
      <div onClick={() => setOpen(o => !o)} style={{ padding: "18px 20px 14px", cursor: "pointer", userSelect: "none", display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
        <div style={{ flex: 1 }}>
          <Label color={isBaseline ? (allDone ? C.sage : C.terra) : s.eyebrowColor || C.sage}>{s.eyebrow}</Label>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.charcoal, lineHeight: 1.3 }}>{s.title}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, flexShrink: 0, paddingTop: 2 }}>
          {checkable && (
            <div style={{ fontSize: 11, fontWeight: 700, color: allDone ? C.sage : isBaseline ? C.terra : C.sage, background: allDone ? C.sageFaint : isBaseline ? C.terraFaint : C.sageFaint, padding: "3px 10px", borderRadius: 100 }}>
              {done}/{total}
            </div>
          )}
          <div style={{ color: C.muted, fontSize: 13 }}>{open ? "▲" : "▼"}</div>
        </div>
      </div>
      <div style={{ maxHeight: open ? 3000 : 0, overflow: "hidden", transition: "max-height 0.3s ease" }}>
        <div style={{ padding: "0 20px 20px" }}>
          {s.intro && <p style={{ fontSize: 12, lineHeight: 1.65, marginBottom: 14, color: isBaseline ? C.terra : C.muted, borderLeft: `3px solid ${isBaseline ? C.terra : C.bgMuted}`, paddingLeft: 12, fontStyle: "italic" }}>{s.intro}</p>}
          <SectionItems type={s.type} items={s.items} si={si} checked={checked} onToggle={onToggle} isBaseline={isBaseline} />
        </div>
      </div>
    </Card>
  );
}

function SectionItems({ type, items, si, checked, onToggle, isBaseline }) {
  if (!items?.length) return null;
  if (type === "steps" || type === "checklist") {
    return (
      <div>
        {items.map((item, i) => {
          const done = checked[si]?.[i] || false;
          return (
            <div key={i} onClick={() => onToggle(si, i)} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "11px 0", cursor: "pointer", borderBottom: i < items.length - 1 ? `1px solid ${C.border}` : "none" }}>
              {type === "steps" ? (
                <div style={{ minWidth: 24, height: 24, borderRadius: "50%", flexShrink: 0, marginTop: 1, background: done ? C.sage : C.bgMuted, color: done ? "#fff" : C.mid, fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.18s" }}>
                  {done ? "✓" : i + 1}
                </div>
              ) : (
                <div style={{ width: 20, height: 20, borderRadius: 6, flexShrink: 0, marginTop: 2, border: `2px solid ${done ? C.sage : isBaseline ? C.terra : C.borderMed}`, background: done ? C.sage : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.18s" }}>
                  {done && <span style={{ color: "#fff", fontSize: 10, fontWeight: 800 }}>✓</span>}
                </div>
              )}
              <span style={{ fontSize: 13, color: C.mid, lineHeight: 1.65 }}><RichText text={item} done={done} /></span>
            </div>
          );
        })}
      </div>
    );
  }
  if (type === "scripts") {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {items.map((item, i) => (
          <div key={i} style={{ background: C.bgAccent, border: `1px solid rgba(74,124,111,0.15)`, borderRadius: 12, padding: "14px 16px" }}>
            <p style={{ fontSize: 13, color: C.mid, lineHeight: 1.7, margin: 0, fontStyle: "italic" }}>{item}</p>
          </div>
        ))}
      </div>
    );
  }
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {items.map((item, i) => (
        <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
          <span style={{ color: C.sage, flexShrink: 0, marginTop: 3, fontSize: 12 }}>●</span>
          <p style={{ fontSize: 13, color: C.mid, lineHeight: 1.65, margin: 0 }}><RichText text={item} /></p>
        </div>
      ))}
    </div>
  );
}

// ── plan builders ──────────────────────────────────────────────
function buildStandardSections(age, device) {
  const isIOS = device === "iphone";
  const tier = age <= 10 ? 1 : age <= 13 ? 2 : 3;
  const tierLabel = tier === 1 ? "8–10" : tier === 2 ? "11–13" : "14–17";
  const tierName = tier === 1 ? "Supervised Access" : tier === 2 ? "Guided Access" : "Earned Access";
  const baseItems = {
    1: [
      isIOS ? "<strong>Parental oversight:</strong> Screen Time is on with a passcode only you know — your child does not have it" : "<strong>Parental oversight:</strong> Google Family Link is installed and linked on both devices — you control the settings",
      "<strong>App downloads:</strong> Nothing can install on their phone without you approving it first",
      "<strong>Web content:</strong> Adult sites are blocked and SafeSearch is on across all browsers",
      "<strong>Social media:</strong> Instagram, TikTok, Snapchat and similar apps are blocked — all require age 13+",
      "<strong>Communication:</strong> They can only reach family and adults you know — no open messaging to strangers",
      "<strong>Bedtime lock:</strong> The phone locks itself every night at a set time — no willpower required from anyone",
    ],
    2: [
      isIOS ? "<strong>Parental oversight:</strong> Screen Time is on with a passcode only you know — activity reports are visible to you" : "<strong>Parental oversight:</strong> Family Link is installed and linked — usage reports are visible to you",
      "<strong>App downloads:</strong> Every new app requires your approval before it installs",
      "<strong>Web content:</strong> Adult sites blocked, SafeSearch on — verified across every browser they use",
      "<strong>Social media:</strong> Off entirely, or limited to one age-appropriate platform with your visibility into the account",
      "<strong>Time limits:</strong> Social, entertainment, and gaming each have their own daily cap — not one combined limit",
      "<strong>Bedtime lock:</strong> The phone locks itself at a set time every night — not a verbal agreement, a system setting",
    ],
    3: [
      isIOS ? "<strong>Parental oversight:</strong> Screen Time is on — weekly activity reports are visible to you, reviewed together" : "<strong>Parental oversight:</strong> Family Link is on — activity reports visible to you, reviewed together monthly",
      "<strong>App downloads:</strong> New apps are discussed before they're downloaded — a standing expectation, not a case-by-case negotiation",
      "<strong>Web content:</strong> Explicit content, adult sites, and highest-risk categories are restricted — not everything, but the categories that matter",
      "<strong>Time limits:</strong> Social and gaming each have a daily cap — targeted limits, not a blanket restriction on everything",
      "<strong>Bedtime lock:</strong> The phone becomes inaccessible at a set time every night — set in the system, not dependent on willpower",
    ],

}

function buildCustomSections(age, device, choices) {
  const isIOS = device === "iphone";
  const young = age <= 11;
  const teen = age >= 14;
  const tier = age <= 10 ? 1 : age <= 13 ? 2 : 3;
  const setupSteps = [];
  if (isIOS) {
    setupSteps.push("On your phone: <strong>Settings → [your name] → Family Sharing</strong> → add your child");
    setupSteps.push("On their iPhone: <strong>Settings → Screen Time → Turn On Screen Time</strong> → This is My Child's iPhone");
    setupSteps.push("Set a <strong>Screen Time passcode</strong> — only you know it");
  } else {
    setupSteps.push("Download <strong>Google Family Link</strong> on your phone → create or link your child's Google account");
    setupSteps.push("On their Android: open Family Link and approve the connection");
  }
  if (choices.downloads === "age-appropriate") setupSteps.push(isIOS ? "Family Sharing → <strong>Ask to Buy: on</strong>" : "Family Link → Controls → app approval: on");
  if (choices.downloads === "restricted") setupSteps.push(isIOS ? "Screen Time → Content & Privacy → App Store: <strong>Don't Allow</strong>" : "Family Link → all apps manually installed only");
  if (choices.downloads === "off") setupSteps.push(isIOS ? "Screen Time → Content & Privacy → Installing Apps: <strong>Don't Allow</strong>" : "Family Link → Play Store access removed");
  if (choices.web === "age-appropriate") setupSteps.push(isIOS ? "Screen Time → Content & Privacy → Web Content: <strong>Limit Adult Websites</strong> + SafeSearch at safesearch.google.com" : "Family Link → Content Filters → SafeSearch on, Chrome filtered");
  if (choices.web === "restricted") setupSteps.push(isIOS ? "Screen Time → Content & Privacy → Web Content: <strong>Allowed Websites Only</strong> → add sites manually" : "Family Link → Chrome: approved sites only");
  if (choices.web === "off") setupSteps.push(isIOS ? "Screen Time → block Safari via Content & Privacy" : "Family Link → Chrome blocked");
  if (choices.social === "age-appropriate") setupSteps.push(isIOS ? "Screen Time → App Limits → <strong>Social Networking</strong> → set daily cap" : "Family Link → app limits → social apps capped");
  if (choices.social === "restricted") setupSteps.push(isIOS ? "Screen Time → App Limits → block Social Networking → manually allow one approved app" : "Family Link → block social, manually approve one");
  if (choices.social === "off") setupSteps.push(isIOS ? "Screen Time → Content & Privacy → block 12+ apps" : "Family Link → approved apps only, no social approved");
  if (choices.screentime === "age-appropriate") setupSteps.push(isIOS ? "Screen Time → App Limits → <strong>Entertainment: 2hrs, Social: 1.5hrs, Games: 1hr</strong> on school days" : "Family Link → daily screen time: 3 hours school days");
  if (choices.screentime === "restricted") setupSteps.push(isIOS ? "Screen Time → App Limits → <strong>Entertainment: 45min, Social: 30min, Games: 45min</strong>" : "Family Link → daily screen time: 2 hours school days");
  if (choices.bedtime === "age-appropriate") setupSteps.push(isIOS ? `Screen Time → Downtime → <strong>${young ? "7:30pm" : teen ? "10pm" : "9pm"}–7am</strong> on school nights` : `Family Link → Bedtime: <strong>${young ? "7:30pm" : teen ? "10pm" : "9pm"}</strong>`);
  if (choices.bedtime === "restricted") setupSteps.push(isIOS ? `Screen Time → Downtime → <strong>${young ? "6:30pm" : teen ? "9pm" : "8pm"}–7am</strong>, all apps blocked` : `Family Link → Bedtime: <strong>${young ? "6:30pm" : teen ? "9pm" : "8pm"}</strong>, all blocked`);
  if (choices.communication === "age-appropriate") setupSteps.push(isIOS ? "Screen Time → Communication Limits → <strong>Contacts Only</strong> during day, <strong>Specific Contacts</strong> overnight" : "Family Link → contact controls on");
  if (choices.communication === "restricted") setupSteps.push(isIOS ? "Screen Time → Communication Limits → <strong>Specific Contacts</strong> (family only) at all times" : "Family Link → family contacts only");
  if (choices.location === "age-appropriate" || choices.location === "restricted") setupSteps.push(isIOS ? "Find My → <strong>Share My Location</strong> → on" : "Family Link → location sharing: on (automatic)");
  if (choices.spending === "age-appropriate") setupSteps.push(isIOS ? "Family Sharing → <strong>Ask to Buy: on</strong> → Screen Time → In-App Purchases → Require Password" : "Family Link → purchase approval: on");
  if (choices.spending === "restricted") setupSteps.push(isIOS ? "Screen Time → Content & Privacy → In-App Purchases: <strong>Don't Allow</strong> → remove saved payment methods" : "Family Link → purchases off, remove payment methods");

  const scripts = tier === 1 ? [
    `"This phone is a tool that belongs to our family. We're learning how to use it together."`,
    `"If something ever makes you uncomfortable online, you can always tell me. You won't get in trouble."`,
  ] : teen ? [
    `"I set this up based on what I think makes sense right now. I want your input on what seems fair."`,
    `"As you show me you can handle it, I'll give you more flexibility. That's the deal."`,
  ] : [
    `"We're setting these rules because we care about you, not because we don't trust you."`,
    `"If something feels off online, come tell me. My first reaction won't be to take your phone away."`,
  ];

  const choiceSummaryItems = CATEGORIES.map(cat => {
    const choice = choices[cat.id] || "age-appropriate";
    const info = cat.levels[choice];
    return `<strong>${cat.label}:</strong> ${info.label} — ${cat.detail[choice]}`;
  });

  return {
    free: [{ eyebrow: "Your Custom Setup", eyebrowColor: C.terra, title: "Your Choices — Confirmed", type: "checklist", isBaseline: true, intro: "These are the settings based on your answers. Tap each one as you confirm it's configured.", items: choiceSummaryItems }],
    paid: [
      { eyebrow: "How to Set It Up", title: `Step-by-Step: ${isIOS ? "iPhone" : "Android"} Configuration`, type: "steps", intro: "Generated from your choices. Menu wording may vary by device model and OS version.", items: setupSteps.slice(0, 12) },
      { eyebrow: "First Conversations", eyebrowColor: C.terra, title: "What to Say When You Hand Over the Phone", type: "scripts", intro: "Set the settings up first. Then have the conversation.", items: scripts },
    ],
  };
}

            <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 20 }}>
              <GhostBtn label="← Back" onClick={() => { setWizardStep(CATEGORIES.length - 1); setCurrentChoice(choices[CATEGORIES[CATEGORIES.length - 1].id] || null); go("wizard"); }} />
              <PrimaryBtn label="Build My Plan →" onClick={() => { setChecked({}); go("plan"); }} />
            </div>
          </div>
        )}

        {/* PLAN */}
        {screen === "plan" && (
          <>
            <PlanBar done={totalDone} total={totalCheckable} />
            <div style={{ padding: "32px 24px 80px" }}>
              <Label color={tier === "paid" ? C.purple : C.terra}>{tier === "paid" ? "Full Setup Plan" : "Free Setup Plan"}</Label>
              <h2 style={{ fontSize: "clamp(1.4rem,4vw,1.9rem)", fontWeight: 700, letterSpacing: "-0.02em", color: C.charcoal, lineHeight: 1.2, marginBottom: 10 }}>
                {device === "iphone" ? "iPhone" : "Android"} · Age {age} · {path === "standard" ? `${tierLabel} Access` : "Custom Access"}
              </h2>
              <p style={{ fontSize: 13, color: C.mid, lineHeight: 1.65, maxWidth: 480, marginBottom: 28 }}>
                {tier === "free"
                  ? <>Start with <strong style={{ color: C.terra }}>The Starting Point</strong> — the device settings to have in place before you hand over the phone. Tap each one as you confirm it's done. Unlock the full guide to get the exact steps for each setting.</>
                  : <>Your full plan is ready. Work through it in order — tap any item to mark it done.</>}
              </p>

              {freeSections.map((s, i) => <Section key={"f"+i} s={s} si={i} checked={checked} onToggle={toggle} defaultOpen={true} />)}

              {tier === "free" ? (
                <div style={{ background: C.bgCard, border: `1.5px solid ${C.purple}`, borderRadius: 20, overflow: "hidden", marginTop: 4, boxShadow: C.shadowMd }}>
                  <div style={{ height: 4, background: `linear-gradient(90deg,${C.purple},${C.sage})` }} />
                  <div style={{ padding: "24px 22px" }}>
                    <Label color={C.purple}>Unlock the Full Setup Guide</Label>
                    <div style={{ fontSize: 16, fontWeight: 700, color: C.charcoal, marginBottom: 8, lineHeight: 1.3 }}>
                      You know what to aim for.<br />Now get the step-by-step guide to make it happen.
                    </div>
                    <p style={{ fontSize: 13, color: C.mid, lineHeight: 1.65, marginBottom: 20 }}>
                      Step-by-step setup instructions generated from your {path === "custom" ? "choices" : "child's age"} — exactly which menus to open, what to tap, and what to set.
                    </p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 24 }}>
                      {[
                        { icon: "⚙️", t: path === "custom" ? "Custom step-by-step instructions" : (device === "iphone" ? "Screen Time & Family Sharing" : "Google Family Link") + " setup guide", d: path === "custom" ? "Each step matches your choices — no irrelevant instructions" : "Exact navigation paths in the right order" },
                        { icon: "💬", t: "First conversations", d: "Age-appropriate scripts for what to say when you hand over the phone" },
                        { icon: "🔒", t: "Built for " + (device === "iphone" ? "iOS" : "Android") + " · Age " + age, d: "Calibrated to your device and child's age — not generic advice" },
                      ].map((item, idx) => (
                        <div key={idx} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                          <div style={{ width: 32, height: 32, borderRadius: 10, background: C.bgMuted, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 15 }}>{item.icon}</div>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 600, color: C.charcoal, marginBottom: 2 }}>{item.t}</div>
                            <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.5 }}>{item.d}</div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Email gate */}
                    <div style={{ background: C.bgMuted, borderRadius: 14, padding: "18px 18px", marginBottom: 4 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: C.charcoal, marginBottom: 12 }}>Enter your email to continue</div>
                      <form onSubmit={submitEmail} style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        <input
                          type="email"
                          value={email}
                          onChange={e => { setEmail(e.target.value); setEmailError(""); }}
                          placeholder="you@example.com"
                          style={{
                            width: "100%", padding: "13px 16px", borderRadius: 12,
                            border: `1.5px solid ${emailError ? C.red : C.borderMed}`,
                            fontSize: 15, color: C.charcoal, background: C.bgCard,
                            outline: "none", fontFamily: "inherit", boxSizing: "border-box",
                          }}
                        />
                        {emailError && <div style={{ fontSize: 12, color: C.red, marginTop: -4 }}>{emailError}</div>}
                        <button type="submit" disabled={emailLoading} style={{
                          fontFamily: "inherit", fontSize: 15, fontWeight: 700,
                          background: emailLoading ? C.bgMuted : C.terra,
                          color: emailLoading ? C.muted : "#fff",
                          border: "none", borderRadius: 100, padding: "14px 24px",
                          cursor: emailLoading ? "not-allowed" : "pointer",
                          boxShadow: emailLoading ? "none" : "0 4px 14px rgba(196,113,74,0.30)",
                          transition: "all 0.2s", width: "100%",
                        }}>
                          {emailLoading ? "One moment..." : "Get the Full Setup Guide →"}
                        </button>
                      </form>
                      <p style={{ fontSize: 11, color: C.muted, textAlign: "center", marginTop: 10, lineHeight: 1.6 }}>
                        No spam. We may send occasional tips for parents navigating tech with kids.
                      </p>
                    </div>
                  </div>
                </div>
              ) : (
                paidSections.map((s, i) => <Section key={"p"+i} s={s} si={freeSections.length + i} checked={checked} onToggle={toggle} defaultOpen={true} />)
              )}

              <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.75, borderTop: `1px solid ${C.border}`, paddingTop: 20, marginTop: 28 }}>
                <strong style={{ color: C.mid, display: "block", marginBottom: 4 }}>About this plan</strong>
                This plan is educational in nature and reflects general best practices for family digital boundaries. It is a starting point, not a comprehensive solution. Menu wording and setting locations vary by device model and OS version — verify all steps on your current device. Raising Digital Teens does not provide legal, clinical, or emergency safety guidance.
              </div>
              <button onClick={restart} style={{ marginTop: 24, fontFamily: "inherit", fontSize: 13, fontWeight: 500, color: C.muted, background: "none", border: `1px solid ${C.border}`, borderRadius: 100, padding: "10px 20px", cursor: "pointer" }}>← Start Over</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
